name: Identity Governance Policy Check 

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main 
  push:
    branches:
      - main

permissions: 
  contents: read
  issues: write

jobs:
  identity-run-policy-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Setup Python 
        uses: actions/setup-python@v5 
        with:
          python-version: "3.11"

      - name: Install Python dependencies 
        run: |
          python -m pip install --upgrade pip 
          pip install pyyaml 

      - name: Transform identity config to JSON
        run: |
          python tools/transform_identity_config.py 

      - name: Install Conftest
        run: | 
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.56.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Run identity governance policy checks
        id: opa
        run: | 
           set +e
           conftest test identity_config.json -p policies/identity -o json > opa_results.json
           echo "exit_code=$?" >> $GITHUB_OUTPUT
           set -e

      - name: Parse OPA results
        id: parse 
        run: | 
          python tools/parse_opa_results.py > violations.json
          echo "violations=$(cat violations.json)" >> $GITHUB_OUTPUT 

      - name: Create or update issues for violations
        if: steps.opa.outputs.exit_code != '0'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Identity Governance Violations Detected"
          content-filepath: ./violations.json
          issue-number: 3
          body: |
             The following identity governance violations were detected:

             ```json 
             ${{ steps.parse.outputs.violations }}
             ```
             Please review the configuration in `.github/config` and update accordingly.
          labels: governance, identity, violation

      - name: Close issue when violations resolved
        if: steps.opa.outputs.exit_code == '0'
        uses: peter-evans/close-issue@v3
        with:
          issue-number: 3
          comment: "All identity governance violations have been resolved. Closing issue."

      - name: Authenticate to Microsoft Graph
        run: | 
          pip install msal requests 
          python tools/auth_test.py 
        env:
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}

      - name: Get tenant state from Microsoft Graph
        run: | 
          python tools/get_tenant_state.py 
        env:
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}

      - name: Run drift detection 
        id: drift 
        run: | 
          python tools/drift_engine.py > drift.output.json 
          echo "drift=$(cat drift_output.json)" >> $GITHUB_OUTPUT 

      - name: Filter drift by severity
        id: drift_filter
        run: |
          python tools/filter_drift.py > drift_filtered.json
          echo "drift_filtered=$(cat drift_filtered.json)" >> $GITHUB_OUTPUT

      - name: Create or update drift issue
        if: ${{ steps.drift_filter.outputs.drift_filtered != '[]' }}
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Identity & OAuth Drift Detected"
          body: |
            The following drift was detected between desired state and tenant:

            ```json
            ${{ steps.drift_filter.outputs.drift_filtered }}
            ```

            Please review and remediate.
          labels: governance, drift, identity, oauth

      - name: Get Secure Score
        id: secure_score
        run: |
          python tools/get_secure_score.py > secure_score.txt
          echo "score=$(cat secure_score.txt)" >> $GITHUB_OUTPUT
        env:
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}

      - name: Create issue for low Secure Score
        if: ${{ steps.secure_score.outputs.score != 'null' && fromJson(steps.secure_score.outputs.score) < 50 }}
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Low Secure Score Detected"
          body: |
            Current Secure Score: **${{ steps.secure_score.outputs.score }}**

            This is below the target threshold of 50.
            Review Secure Score recommendations in the M365 Defender portal and update controls.
          labels: governance, secure-score, security-posture

      - name: Get Identity Secure Score
        id: identity_secure_score
        run: |
          python tools/get_identity_secure_score.py > identity_secure_score.txt
          echo "score=$(cat identity_secure_score.txt)" >> $GITHUB_OUTPUT
        env:
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}

      - name: Create issue for low Identity Secure Score
        if: ${{ steps.identity_secure_score.outputs.score != 'null' && fromJson(steps.identity_secure_score.outputs.score) < 60 }}
        uses: peter-evans/create-or-update-issue@v4
        with:
          title: "Low Identity Secure Score Detected"
          body: |
            Current Identity Secure Score: **${{ steps.identity_secure_score.outputs.score }}**

            This is below the target threshold of 60.
            Review Identity Protection, MFA, Conditional Access, and risky user policies to improve your score.
          labels: governance, secure-score, security-posture

      - name: Close Identity Secure Score issue when resolved
        if: ${{ steps.identity_secure_score.outputs.score != 'null' && fromJson(steps.identity_secure_score.outputs.score) >= 60 }}
        uses: peter-evans/close-issue@v3
        with:
          issue-number: 2
          comment: "Identity Secure Score has improved above threshold. Closing issue."





         
